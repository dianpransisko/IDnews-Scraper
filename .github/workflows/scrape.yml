name: News Scraper Robot

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Update ke v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install httpx supabase resend python-dotenv beautifulsoup4 requests

      - name: Execute Scraper & Email
        env:
          # Kunci Rahasia
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}
          # SANGAT PENTING: Titik (.) artinya folder root
          PYTHONPATH: .
        run: python jobs/scheduler_github.py
